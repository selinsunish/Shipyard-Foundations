apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-web-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web-container
          image: my-web-app
          imagePullPolicy: Never   
          ports:
            - containerPort: 80
          env:
            - name: STUDENT_NAME
              value: "Selin Emla Sunish"
